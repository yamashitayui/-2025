<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>山下結衣</title>
    <style>
      .note {
        background-color: #ccffcc; /* 薄い緑 */
        line-height: 2.5em; /* 文字の高さ */
        padding: 10px; /* 内側余白を追加して見やすく */
      }
      .note img {
        display: block; /* ブロック要素にする */
        margin: 0 auto; /* 左右の余白を自動で均等に */
      }
      p {
        color: red;
      }
    </style>
  </head>
  <body>
    <h1>本の紹介</h1>
    <h4>山下結衣</h4>
    <div class="note">
      <p>かがみの孤城　辻村深月著</p>
      <img src="https://item-shopping.c.yimg.jp/i/n/bookfan_bk-4591153320" width="30%">
      <p>中学生の主人公こころはあることが原因で学校に行けず家に引きこもる少女。ある日、自室の鏡が光り中に吸い込まれたこころは狼の仮面をつけた謎の少女が仕切る孤城に招待される。
      そこにはこころと同じように学校に行くことのできない6人の男女がいた。そして謎の少女はこの城に隠されている鍵を見つけ出せば何でも願いをかなえられると言うのだった。</p>
      <p>7人の少年少女が織りなす不思議な不思議な鏡の世界の物語。</p>
    </div>
  </body>
</html>>
